<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — ISO15189 实验室无纸化管理系统</title>
  <link rel="stylesheet" href="/libs/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <div class="login-split">

    <!-- 左侧：实验室视觉面板 -->
    <div class="login-visual">
      <div class="visual-grid"></div>
      <div class="visual-glow"></div>
      <div class="visual-tagline">
        <span>精准 · 溯源 · 合规</span>
      </div>
    </div>

    <!-- 右侧：登录表单 -->
    <div class="login-form-panel">
      <div class="login-form-inner">
        <img src="images/logo.png" alt="实验室管理系统" class="login-logo">

        <div class="login-card">
          <div id="loginError" class="login-error"></div>

          <form id="loginForm">
            <div class="form-group">
              <label for="username">用户名</label>
              <input type="text" id="username" class="form-control" placeholder="请输入用户名" autocomplete="username" required>
            </div>

            <div class="form-group">
              <label for="password">密码</label>
              <input type="password" id="password" class="form-control" placeholder="请输入密码" autocomplete="current-password" required>
            </div>

            <div class="form-group">
              <label for="groupSelect">所属小组</label>
              <select id="groupSelect" class="form-control" required>
                <option value="">加载中...</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
              <i class="fa-solid fa-right-to-bracket"></i> 登 录
            </button>
          </form>
        </div>

        <div class="login-footer">
          &copy; 2024 实验室内部无纸化管理系统 v1.0
        </div>
      </div>
    </div>

  </div>

  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
