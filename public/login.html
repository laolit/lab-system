<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — ISO15189 实验室无纸化管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <!-- 背景装饰粒子 -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">
          <i class="fa-solid fa-flask"></i>
        </div>
        <h1>实验室无纸化管理</h1>
        <p>ISO 15189 质量体系平台</p>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" class="form-control" placeholder="请输入用户名" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" class="form-control" placeholder="请输入密码" autocomplete="current-password" required>
        </div>

        <div class="form-group">
          <label for="groupSelect">所属小组</label>
          <select id="groupSelect" class="form-control" required>
            <option value="">加载中...</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <i class="fa-solid fa-right-to-bracket"></i> 登 录
        </button>
      </form>
    </div>

    <div class="login-footer">
      &copy; 2024 实验室内部无纸化管理系统 v1.0
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
