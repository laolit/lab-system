<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户及权限管理 — ISO15189 实验室无纸化管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body class="app-layout">

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fa-solid fa-flask"></i></div>
    <div class="title">ISO 15189<br>无纸化管理</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">主菜单</div>
    <a href="../index.html"><i class="fa-solid fa-gauge-high"></i> 仪表盘</a>
    <div class="nav-section">质量监控</div>
    <a href="quality.html"><i class="fa-solid fa-chart-line"></i> TAT 质量监控</a>
    <div class="nav-section">核心业务</div>
    <a href="hr.html"><i class="fa-solid fa-users"></i> 人力资源与能力资质</a>
    <a href="equipment.html"><i class="fa-solid fa-microscope"></i> 设备设施与计量溯源</a>
    <a href="consumables.html"><i class="fa-solid fa-vial"></i> 耗材试剂与标准物质</a>
    <a href="documents.html"><i class="fa-solid fa-file-lines"></i> 体系文件与检测方法</a>
    <a href="environment.html"><i class="fa-solid fa-temperature-half"></i> 环境设施与洁净合规</a>
    <a href="risk.html"><i class="fa-solid fa-shield-halved"></i> 质量溯源与风险辅助</a>
    <div class="nav-section">系统管理</div>
    <a href="admin.html" class="active"><i class="fa-solid fa-gear"></i> 用户及权限管理</a>
  </nav>
  <div class="sidebar-footer"><span id="sidebarUserName">—</span><br><span id="sidebarGroupName" style="font-size:11px;color:rgba(255,255,255,0.45);"></span></div>
</aside>

<main class="main-content">
  <header class="topbar">
    <div class="topbar-left"><h2 class="page-title">系统管理</h2></div>
    <div class="topbar-right">
      <select id="groupSwitcher" class="group-switcher"></select>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userDisplayName">用户</span>
      </div>
      <button class="btn btn-outline btn-sm" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
    </div>
  </header>

  <div class="page-content">

    <!-- ====== Tab 导航 ====== -->
    <div class="tab-nav" id="adminTabs">
      <button class="tab-item active" data-tab="users">
        <i class="fa-solid fa-users"></i> 用户管理
      </button>
      <button class="tab-item" data-tab="groups">
        <i class="fa-solid fa-layer-group"></i> 小组管理
      </button>
    </div>

    <!-- ====== 面板：用户管理 ====== -->
    <div class="tab-panel active" id="panel-users">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3 style="font-size:16px;">用户列表</h3>
          <button class="btn btn-primary btn-sm" onclick="openUserDialog()"><i class="fa-solid fa-plus"></i> 新增用户</button>
        </div>
        <table class="data-table" id="userTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>用户名</th>
              <th>显示名称</th>
              <th>角色</th>
              <th>所属小组</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:#9ca3af;">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ====== 面板：小组管理 ====== -->
    <div class="tab-panel" id="panel-groups">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3 style="font-size:16px;">小组列表</h3>
          <button class="btn btn-primary btn-sm" onclick="openGroupDialog()"><i class="fa-solid fa-plus"></i> 新增小组</button>
        </div>
        <table class="data-table" id="groupTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>编码</th>
              <th>名称</th>
              <th>描述</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="groupTableBody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af;">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- ====== 用户弹窗 ====== -->
<div class="modal-overlay" id="userModal" style="display:none;">
  <div class="modal">
    <h3 id="userModalTitle">新增用户</h3>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="editUsername" class="form-control" placeholder="请输入用户名">
      </div>
      <div class="form-group" id="pwdGroup">
        <label id="pwdLabel">密码</label>
        <input type="password" id="editPassword" class="form-control" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label>显示名称</label>
        <input type="text" id="editDisplayName" class="form-control" placeholder="请输入显示名称">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="editRole" class="form-control">
          <option value="viewer">viewer — 仅查看</option>
          <option value="operator">operator — 操作员</option>
          <option value="manager">manager — 管理员</option>
          <option value="admin">admin — 系统管理员</option>
        </select>
      </div>
      <div class="form-group">
        <label>所属小组（多选）</label>
        <div id="editGroups" style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;">
          <span style="color:#9ca3af;font-size:13px;">加载中...</span>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeUserModal()">取消</button>
      <button class="btn btn-primary" onclick="saveUser()">确认</button>
    </div>
  </div>
</div>

<!-- ====== 小组弹窗 ====== -->
<div class="modal-overlay" id="groupModal" style="display:none;">
  <div class="modal">
    <h3 id="groupModalTitle">新增小组</h3>
    <div class="modal-body">
      <input type="hidden" id="editGroupId">
      <div class="form-group">
        <label>小组编码 <span style="color:var(--danger);">*</span></label>
        <input type="text" id="editGroupCode" class="form-control" placeholder="如: clinical_lab">
      </div>
      <div class="form-group">
        <label>小组名称 <span style="color:var(--danger);">*</span></label>
        <input type="text" id="editGroupName" class="form-control" placeholder="如: 临床检验">
      </div>
      <div class="form-group">
        <label>描述</label>
        <input type="text" id="editGroupDesc" class="form-control" placeholder="小组描述/备注">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeGroupModal()">取消</button>
      <button class="btn btn-primary" onclick="saveGroup()">确认</button>
    </div>
  </div>
</div>

<script src="../js/common.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
