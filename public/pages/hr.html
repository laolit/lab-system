<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/libs/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/hr.css">
</head>
<body class="app-layout">

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fa-solid fa-flask"></i></div>
    <div class="title">ISO 15189<br>无纸化管理</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">主菜单</div>
    <a href="../index.html"><i class="fa-solid fa-gauge-high"></i> 仪表盘</a>
    <div class="nav-section">质量监控</div>
    <a href="quality.html"><i class="fa-solid fa-chart-line"></i> TAT 质量监控</a>
    <div class="nav-section">核心业务</div>
    <a href="hr.html" class="active"><i class="fa-solid fa-users"></i> 人力资源与能力资质</a>
    <a href="equipment.html"><i class="fa-solid fa-microscope"></i> 设备设施与计量溯源</a>
    <a href="consumables.html"><i class="fa-solid fa-vial"></i> 耗材试剂与标准物质</a>
    <a href="documents.html"><i class="fa-solid fa-file-lines"></i> 体系文件与检测方法</a>
    <a href="environment.html"><i class="fa-solid fa-temperature-half"></i> 环境设施与洁净合规</a>
    <a href="risk.html"><i class="fa-solid fa-shield-halved"></i> 质量溯源与风险辅助</a>
    <div class="nav-section">系统管理</div>
    <a href="admin.html"><i class="fa-solid fa-gear"></i> 用户及权限管理</a>
    <a href="monitor-config.html"><i class="fa-solid fa-server"></i> 质量监控配置管理</a>
  </nav>
  <div class="sidebar-footer"><span id="sidebarUserName">—</span><br><span id="sidebarGroupName" style="font-size:11px;color:rgba(255,255,255,0.45);"></span></div>
</aside>

<main class="main-content">
  <header class="topbar">
    <div class="topbar-left"><h2 class="page-title">人力资源与能力资质</h2></div>
    <div class="topbar-right">
      <select id="groupSwitcher" class="group-switcher"></select>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userDisplayName">用户</span>
      </div>
      <button class="btn btn-outline btn-sm" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
    </div>
  </header>

  <div class="page-content">

    <!-- Tab 导航 -->
    <div class="tab-nav">
      <button class="tab-item active" data-tab="personnel">
        <i class="fa-solid fa-id-card"></i> 人员信息
      </button>
    </div>

    <!-- ====== 面板：人员信息 ====== -->
    <div class="tab-panel active" id="panel-personnel">
      <div class="card">
        <div class="toolbar">
          <div class="search-group">
            <input type="text" id="searchInput" placeholder="搜索姓名...">
            <button class="btn-search" onclick="doSearch()"><i class="fa-solid fa-magnifying-glass"></i> 搜索</button>
          </div>
          <div class="date-range-group">
            <input type="date" id="dateFrom" class="date-input" title="入职日期-开始">
            <span class="date-separator">至</span>
            <input type="date" id="dateTo" class="date-input" title="入职日期-结束">
          </div>
          <button class="btn btn-outline btn-clear btn-sm" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i> 清除</button>
          <button class="btn btn-primary btn-sm btn-add" onclick="openPersonnelDialog(null,'add')"><i class="fa-solid fa-plus"></i> 新增人员</button>
        </div>

        <table class="data-table" id="personnelTable">
          <thead>
            <tr>
              <th>姓名</th>
              <th>性别</th>
              <th>年龄</th>
              <th>手机号</th>
              <th>职称</th>
              <th>入职日期</th>
              <th>所属小组</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="personnelTableBody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:#9ca3af;">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- ====== CV 简历风格弹窗 ====== -->
<div class="modal-overlay" id="personnelModal" style="display:none;">
  <div class="modal" style="max-width:700px;">
    <h3 id="personnelModalTitle">新增人员</h3>
    <div class="modal-body">
      <input type="hidden" id="editPersonnelId">

      <!-- 新增/编辑模式：CV 表单 -->
      <div id="personnelFormFields">
        <div class="cv-layout">
          <!-- 左侧：照片区域 -->
          <div class="cv-photo-section">
            <div class="cv-photo-box" id="photoPreviewBox">
              <img id="photoPreviewImg" src="" alt="证件照" style="display:none;">
              <div class="cv-photo-placeholder" id="photoPlaceholder">
                <i class="fa-solid fa-camera"></i>
                <span>证件照</span>
              </div>
            </div>
            <label class="cv-photo-upload-btn">
              <i class="fa-solid fa-upload"></i> 上传照片
              <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhotoUpload(this)">
            </label>
            <button class="cv-photo-remove" id="photoRemoveBtn" style="display:none;" onclick="removePhoto()"><i class="fa-solid fa-trash"></i> 移除照片</button>
          </div>

          <!-- 右侧：详情表单 -->
          <div class="cv-details-section">
            <div class="cv-header-section">
              <input type="text" id="editName" class="form-control cv-name-input" placeholder="姓名 *">
              <input type="text" id="editTitle" class="form-control cv-title-input" placeholder="职称">
            </div>
            <div class="cv-details-grid">
              <div class="form-group">
                <label>性别 <span style="color:var(--danger);">*</span></label>
                <select id="editGender" class="form-control">
                  <option value="">请选择</option>
                  <option value="男">男</option>
                  <option value="女">女</option>
                </select>
              </div>
              <div class="form-group">
                <label>年龄</label>
                <input type="number" id="editAge" class="form-control" placeholder="年龄" min="18" max="100">
              </div>
              <div class="form-group">
                <label>手机号</label>
                <input type="text" id="editPhone" class="form-control" placeholder="手机号">
              </div>
              <div class="form-group">
                <label>身份证号</label>
                <input type="text" id="editIdCard" class="form-control" placeholder="18 位身份证号" maxlength="18">
              </div>
              <div class="form-group">
                <label>入职日期</label>
                <input type="date" id="editHireDate" class="form-control">
              </div>
              <div class="form-group">
                <label>所属小组</label>
                <select id="editGroupId" class="form-control">
                  <option value="">请选择小组</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 查看模式：CV 卡片 -->
      <div id="personnelReadOnly" style="display:none;">
        <div id="personnelDetailContent"></div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="modal-actions" id="actionsAddEdit">
      <button class="btn btn-outline" onclick="closePersonnelDialog()">取消</button>
      <button class="btn btn-primary" onclick="savePersonnelRecord()">保存</button>
    </div>
    <div class="modal-actions" id="actionsView" style="display:none;">
      <button class="btn btn-outline" onclick="closePersonnelDialog()">关闭</button>
    </div>
  </div>
</div>

<script src="../js/common.js"></script>
<script src="../js/hr.js"></script>
<script>
  if (!checkAuth()) {}
  renderUserInfo();
  document.getElementById('sidebarUserName').textContent =
    ((getUser() || {}).display_name || (getUser() || {}).username || '—');
</script>
</body>
</html>
